<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>BookWorm - Sua Próxima História</title>
    <link rel="stylesheet" href="src/styles/style.css" />
  </head>
  <body>
    <header>
      <h1>BookWorm 📖</h1>
      <p id="saudacao-livraria">Abrindo os livros...</p>
    </header>
    <main class="container">
      <section id="banner-cultura" class="painel">
        <h2>Clube do Livro ☕</h2>
        <p>Passe o mouse para ativar o modo de leitura confortável.</p>
      </section>
      <section class="painel">
        <div class="produto-dica">
          <img src="src/images/livro.png" class="img-produto" />
        </div>
        <label for="qtd-livros">Quantos livros da promoção (R$ 42,00)?</label>
        <input type="number" id="qtd-livros" value="0" />
        <p class="total">Total: R$ <strong id="total-pagar">0.00</strong></p>
      </section>
      <section class="painel">
        <input type="text" id="nome-livro" placeholder="Título do livro" />
        <button id="btn-lista" class="btn-primario">Adicionar à Lista</button>
      </section>
      <section class="painel vitrine">
        <button id="btn-limpar" class="btn-secundario">Limpar Lista</button>
        <div id="lista-leitura"></div>
      </section>
    </main>
    <script src="src/scripts/script.js"></script>
  </body>
</html>
