<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BellaPizza - A Melhor da Cidade</title>
    <link rel="stylesheet" href="src/styles/style.css" />
  </head>
  <body>
    <header>
      <h1>BellaPizza 🍕</h1>
      <p id="saudacao-pizzaria">Carregando fornalha...</p>
    </header>

    <main class="container">
      <section id="banner-promocao" class="painel">
        <h2>Promoção do Dia! 🍅</h2>
        <p>Passe o mouse aqui para ver o destaque do nosso Chef.</p>
      </section>

      <section class="painel">
        <h2>Calculadora de Rodízio (R$ 45,00 / pessoa)</h2>

        <div class="produto-dica">
          <img
            src="src/images/pizza.png"
            alt="Fatia de Pizza de Calabresa"
            class="img-produto"
          />
        </div>

        <div class="grupo-input">
          <label for="qtd-pessoas">Quantas pessoas vão participar?</label>
          <input type="number" id="qtd-pessoas" min="1" value="0" />
        </div>
        <p class="total">
          Total do Rodízio: R$ <strong id="total-pagar">0.00</strong>
        </p>
      </section>

      <section class="painel">
        <h2>Montar sua Pizza (Delivery)</h2>
        <div class="grupo-input">
          <label>Qual sabor você quer adicionar?</label>
          <input
            type="text"
            id="sabor-pizza"
            placeholder="Ex: Calabresa, Marguerita, Frango..."
          />
        </div>
        <button id="btn-adicionar" class="btn-primario">Adicionar Sabor</button>
      </section>

      <section class="painel vitrine">
        <h2>Resumo do seu Pedido</h2>
        <button id="btn-cancelar" class="btn-secundario">
          Cancelar Pedido
        </button>

        <div id="lista-pedidos"></div>
      </section>
    </main>
    <script src="src/scripts/script.js"></script>
  </body>
</html>
